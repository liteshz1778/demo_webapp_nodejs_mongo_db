apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-mongodb-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp-mongodb
  template:
    metadata:
      labels:
        app: webapp-mongodb
    spec:
      containers:
        # MongoDB container
        - name: mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017
        # Node.js web app
        - name: webapp
          image: liteshz/webapp-demo-nodejs-mongodb:v1
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URL
              value: "mongodb://localhost:27017/testdb"
